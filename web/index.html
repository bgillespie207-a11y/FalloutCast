<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FalloutCast</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="disclaimer"></div>
    <div id="app">
      <aside id="panel">
        <h1>FalloutCast</h1>
        <p class="subtitle">Weather-driven fallout planning estimate</p>

        <form id="plume-form">
          <label class="checkbox-row exchange-toggle">
            <input type="checkbox" id="exchange-mode" />
            Full nuclear exchange (all public targets, national max envelope)
          </label>

          <div id="single-target-fields">
            <!-- step="any" throughout: a fixed decimal step (e.g. 0.01) makes
            the browser's native step-mismatch validation reject values like
            0.3 that aren't an exact floating-point multiple of the step,
            silently blocking submission with no visible error unless the
            user notices the validation bubble. These are continuous physical
            quantities with no real reason to snap to a grid anyway. -->
            <label
              >Latitude
              <input type="number" id="lat" step="any" value="41.14" required />
            </label>
            <label
              >Longitude
              <input type="number" id="lon" step="any" value="-104.82" required />
            </label>
            <div class="zip-row">
              <label
                >ZIP code (optional)
                <input
                  type="text"
                  id="zip"
                  inputmode="numeric"
                  pattern="[0-9]{5}"
                  maxlength="5"
                  placeholder="e.g. 82001"
                />
              </label>
              <button type="button" id="zip-lookup-btn">Look up</button>
            </div>
            <fieldset>
              <legend>Tier</legend>
              <label class="radio"
                ><input type="radio" name="tier" value="0" checked /> 0 (WSEG-10,
                fast)</label
              >
              <label class="radio"
                ><input type="radio" name="tier" value="1" /> 1 (multi-layer,
                live wind required)</label
              >
            </fieldset>
            <p class="hint">Click the map to set ground zero, type coordinates, or look up a ZIP code.</p>
          </div>

          <label
            >Yield (Mt)
            <input type="number" id="yield_mt" step="any" min="0.001" value="0.3" required />
          </label>
          <label
            >Fission fraction
            <input
              type="number"
              id="fission_fraction"
              step="any"
              min="0.01"
              max="1"
              value="0.5"
              required
            />
          </label>
          <button type="submit" id="compute-btn">Compute plume</button>
        </form>

        <div id="status"></div>

        <section id="time-control" hidden>
          <label for="time-slider">
            Time after burst: <span id="time-label">H+1</span>
          </label>
          <input type="range" id="time-slider" min="0" max="1000" value="0" />
        </section>
        <!-- Outside #time-control: the exchange-envelope view has a legend
        (fixed H+1 levels) but no decay-time slider, so the two can't share
        a visibility toggle. -->
        <div id="legend"></div>

        <button id="export-btn" hidden>Download GeoJSON</button>

        <div id="notes"></div>
      </aside>
      <div id="map"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
